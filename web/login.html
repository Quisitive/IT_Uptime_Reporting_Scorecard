<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — IT Scorecard Collector</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  :root{--bg:#0a4b78;--panel:#fff;--ink:#1a2330;--muted:#5b6675;--line:#cbd5e1;--brand:#0a4b78;--brand2:#1177b8;--bad:#cf3838}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(120deg,#0a4b78,#1177b8);
    font-family:"Segoe UI",Roboto,Arial,sans-serif}
  .card{background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.25);padding:32px;width:340px}
  img{height:56px;width:56px;margin-bottom:14px;border-radius:12px}
  h1{font-size:18px;margin:0 0 4px;color:var(--ink)}
  p{margin:0 0 20px;color:var(--muted);font-size:13px}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px}
  input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit}
  button{width:100%;margin-top:20px;padding:11px;border:0;border-radius:9px;background:var(--brand);color:#fff;
    font-size:14px;font-weight:650;cursor:pointer}
  button:hover{background:var(--brand2)}
  .err{color:var(--bad);font-size:13px;margin-top:12px;min-height:18px}
</style>
</head>
<body>
  <form class="card" id="f">
    <img src="icon.svg" alt="IT Scorecard">
    <h1>IT Scorecard Collector</h1>
    <p>Sign in to continue</p>
    <label>Username</label><input id="u" autocomplete="username" value="admin">
    <label>Password</label><input id="p" type="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
    <div class="err" id="e"></div>
  </form>
<script>
document.getElementById('f').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value }) });
  if (r.ok) location.href = '/';
  else document.getElementById('e').textContent = 'Invalid username or password.';
});
</script>
</body>
</html>
